<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김현섭 — Web Developer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --accent2: #3fb950; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 3rem; max-width: 560px; width: 100%; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border); margin-bottom: 1.5rem; }
    .name { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
    .handle { color: var(--muted); font-size: 1rem; margin-top: 0.25rem; }
    .bio { margin-top: 1.25rem; color: var(--muted); font-size: 0.95rem; line-height: 1.6; }
    .badge { display: inline-block; background: rgba(88,166,255,0.1); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); border-radius: 20px; padding: 0.2rem 0.75rem; font-size: 0.8rem; margin-top: 1rem; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; }
    .link-item { display: flex; align-items: center; gap: 0.75rem; color: var(--text); text-decoration: none; font-size: 0.9rem; padding: 0.6rem 0.75rem; border-radius: 8px; transition: background 0.15s; }
    .link-item:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
    .link-icon { width: 18px; color: var(--muted); flex-shrink: 0; }
    .status { display: flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem; font-size: 0.82rem; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://avatars.githubusercontent.com/u/19829606?v=4" alt="김현섭" />
    <div class="name">김현섭</div>
    <div class="handle">@9oodEnough · HyunSup Kim</div>
    <div class="bio">Web Developer based in Pangyo, Korea.</div>
    <span class="badge">Web Developer</span>
    <hr class="divider" />
    <div class="links">
      <a class="link-item" href="https://github.com/9oodEnough" target="_blank" rel="noopener">

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김현섭 — Web Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text: #f0f0ff;
      --muted: rgba(255,255,255,0.45);
      --accent: #7c6ff7;
      --accent2: #4fd1c5;
      --gradient: linear-gradient(135deg, #7c6ff7 0%, #4fd1c5 100%);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(124,111,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(ellipse, rgba(79,209,197,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto;
      gap: 12px;
      max-width: 720px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    /* Card spans */
    .card-profile { grid-column: span 2; }
    .card-avatar  { grid-column: span 1; display: flex; align-items: center; justify-content: center; }
    .card-links   { grid-column: span 3; }
    .card-status  { grid-column: span 1; }
    .card-bio     { grid-column: span 2; }

    /* Profile card */
    .profile-tag {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .profile-tag::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .name-en {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.4rem;
      font-weight: 400;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 1rem;
      background: rgba(124,111,247,0.15);
      border: 1px solid rgba(124,111,247,0.3);
      color: #a99ef7;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* Avatar card */
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid rgba(124,111,247,0.4);
      box-shadow: 0 0 30px rgba(124,111,247,0.2);
    }

    /* Bio card */
    .bio-text {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 400;
    }
    .bio-text strong {
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    /* Status card */
    .status-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .status-value {
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4fd1c5;
      box-shadow: 0 0 8px #4fd1c5;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* Links card */
    .links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .link-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 0.5rem;
      border-radius: 14px;
      text-decoration: none;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.2s;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .link-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
    }
    .link-icon {
      width: 20px;
      height: 20px;
    }

    /* Gradient accent line on profile card */
    .card-profile::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,111,247,0.6), rgba(79,209,197,0.4), transparent);
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .card-profile { grid-column: span 2; }
      .card-avatar  { grid-column: span 2; }
      .card-links   { grid-column: span 2; }
      .card-status  { grid-column: span 1; }
      .card-bio     { grid-column: span 1; }
      .links { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="grid">

    <!-- Profile -->
    <div class="card card-profile">
      <div class="profile-tag">Web Developer</div>
      <div class="name">김현섭</div>
      <div class="name-en">HyunSup Kim · @9oodEnough</div>
      <span class="badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        Open to work
      </span>
    </div>

    <!-- Avatar -->
    <div class="card card-avatar">
      <img class="avatar" src="https://avatars.githubusercontent.com/u/19829606?v=4" alt="김현섭" />
    </div>

    <!-- Bio -->
    <div class="card card-bio">
      <div class="bio-text">
        <strong>판교</strong>에서 일하는 웹 개발자.<br />
        Web Developer based in <strong>Pangyo, Korea</strong>.
      </div>
    </div>

    <!-- Status -->
    <div class="card card-status">
      <div class="status-label">Location</div>
      <div class="status-value">
        <span class="dot"></span>
        판교, Korea
      </div>
    </div>

    <!-- Links -->
    <div class="card card-links">
      <div class="links">

    </div>

  </div>
</body>
</html>
